version: '3.9'

services:
  app:
    build:
      context: .
      target: runner
    container_name: logsystem
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    networks:
      - logsystem
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  uploads:
  logs:

networks:
  logsystem:
    driver: bridge
